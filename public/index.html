<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchiGram</title>
  <link rel="icon" href="/favicon.png" />
  <link rel="stylesheet" href="/styles.css?v=8" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0b0f19" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <section id="auth-screen" class="screen">
      <div class="auth-card">
        <h1>ArchiGram</h1>
        <p class="muted">Простой приватный веб-мессенджер для друзей</p>

        <div class="tabs">
          <button class="tab active" data-tab="login">Вход</button>
          <button class="tab" data-tab="register">Регистрация</button>
        </div>

        <form id="login-form" class="auth-form">
          <label>
            <span>Логин</span>
            <input type="text" name="username" required minlength="3" />
          </label>
          <label>
            <span>Пароль</span>
            <input type="password" name="password" required minlength="6" />
          </label>
          <button type="submit">Войти</button>
        </form>

        <form id="register-form" class="auth-form hidden" enctype="multipart/form-data">
          <label>
            <span>Логин</span>
            <input type="text" name="username" required minlength="3" />
          </label>
          <label>
            <span>Пароль</span>
            <input type="password" name="password" required minlength="6" />
          </label>
          <label>
            <span>Аватар</span>
            <input type="file" name="avatar" accept="image/*" />
          </label>
          <button type="submit">Создать аккаунт</button>
        </form>

        <div id="auth-error" class="error hidden"></div>
      </div>
    </section>

    <section id="chat-screen" class="screen hidden">
      <aside class="sidebar">
        <div class="sidebar-header">
          <button id="open-profile-btn" class="me-block me-button" type="button">
            <img id="me-avatar" class="avatar" alt="my avatar" />
            <div>
              <div id="me-name" class="strong"></div>
              <div class="muted">Ты в сети</div>
            </div>
          </button>

          <button id="logout-btn" class="ghost-btn" type="button">Выйти</button>
        </div>

        <button id="enable-push-btn" class="push-btn" type="button">
          Включить уведомления
        </button>

        <div class="section-title collapsible" id="users-toggle">
          <span class="arrow">‣</span> Люди
        </div>
        <div id="users-list" class="list"></div>

        <div class="section-title collapsible" id="chats-toggle">
          <span class="arrow">‣</span> Мои чаты
        </div>
        <div id="chats-list" class="list"></div>
      </aside>

      <main class="chat-panel">
        <div id="empty-state" class="empty-state">
          <h2>Выбери человека слева</h2>
          <p class="muted">Открой личный чат и отправь первое сообщение.</p>
        </div>

        <div id="chat-area" class="hidden full-height">
          <header class="chat-header">
            <button id="mobile-back-btn" class="mobile-back-btn" type="button">←</button>

            <div class="me-block chat-head-user">
              <img id="chat-avatar" class="avatar" alt="chat avatar" />
              <div class="chat-head-meta">
                <div id="chat-title" class="strong"></div>
                <div id="chat-status" class="muted"></div>
              </div>
            </div>
          </header>

          <div id="messages" class="messages"></div>
          <div id="typing-indicator" class="typing muted hidden">Собеседник печатает…</div>

          <form id="message-form" class="composer" enctype="multipart/form-data">
            <label class="file-label icon-btn">
              <input id="image-input" type="file" accept="image/*" />
              <span>📎</span>
            </label>

            <button id="record-voice-btn" class="icon-btn" type="button" title="Записать голосовое">
              🎤
            </button>

            <button id="stop-voice-btn" class="icon-btn hidden" type="button" title="Остановить запись">
              ⏹
            </button>

            <input
              id="message-input"
              type="text"
              placeholder="Напиши сообщение..."
              autocomplete="off"
            />

            <button id="send-btn" class="send-btn" type="submit">Отправить</button>
          </form>

          <div id="selected-file" class="muted small"></div>
          <div id="voice-status" class="muted small hidden"></div>
        </div>
      </main>
    </section>
  </div>

  <div id="profile-modal" class="modal hidden">
    <div id="profile-backdrop" class="modal-backdrop"></div>

    <div class="modal-card">
      <div class="modal-header">
        <div class="strong">Профиль</div>
        <button id="close-profile-btn" class="ghost-btn" type="button">✕</button>
      </div>

      <div class="profile-avatar-block">
        <img id="profile-avatar-preview" class="profile-avatar" alt="profile avatar" />
        <input id="profile-avatar-input" type="file" accept="image/*" hidden />
        <label for="profile-avatar-input" id="profile-avatar-upload-label" class="avatar-upload-btn">
          Изменить
        </label>
      </div>

      <div id="profile-username-row" class="profile-readonly muted small hidden"></div>
      <div id="profile-created-at" class="profile-readonly muted small hidden"></div>

      <form id="profile-form" class="profile-form">
        <label>
          <span>Имя</span>
          <input id="profile-display-name" type="text" maxlength="40" placeholder="Как тебя показывать" />
        </label>

        <label>
          <span>О себе</span>
          <textarea id="profile-bio" maxlength="160" rows="4" placeholder="Пару слов о себе"></textarea>
        </label>

        <button id="profile-save-btn" type="submit">Сохранить</button>
      </form>
    </div>
  </div>

  <script src="/app.js?v=8"></script>
</body>
</html>
